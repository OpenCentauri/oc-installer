window_title = "OpenCentauri installer"

[display.framebuffer]
fb_path = "/dev/fb0"
event_path = "/dev/input/event1"

[submenus."Install OpenCentauri"."Install Patched (Online)"]
tasks = [
    { name = "Check boot slot", command = ["/bin/sh", "/user-resource/update_tmp/check-boot-slot.sh"], show_stdout = true },
    { name = "Download firmware", command = ["/bin/sh", "/user-resource/update_tmp/download-firmware.sh", "patched"] },
    { name = "Install firmware", command = ["/bin/sh", "/user-resource/update_tmp/install-oc.sh"] },
]
completed_actions = [
    { name = "Reboot", command = ["/bin/sh", "-c", "reboot"] },
]
index = 0

