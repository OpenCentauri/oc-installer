    { name = "Preserve WiFi credentials", command = ["/bin/sh", "/user-resource/update_tmp/extract-wifi.sh"], show_stdout = true, stop_on_failure = false },
    { name = "Download firmware", command = ["/bin/sh", "/user-resource/update_tmp/download-firmware.sh", "cosmos"] },
    { name = "Install firmware", command = ["/bin/sh", "/user-resource/update_tmp/install-oc.sh"] },
]
